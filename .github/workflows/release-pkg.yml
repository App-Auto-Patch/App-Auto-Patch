name: Build and attach installer pkg

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-pkg:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import signing certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_INSTALLER_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_INSTALLER_P12_PASSWORD }}
        run: |
          KEYCHAIN_PW=$(openssl rand -base64 24)
          security create-keychain -p "$KEYCHAIN_PW" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PW" build.keychain
          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/productbuild -T /usr/bin/productsign -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,productbuild: -s -k "$KEYCHAIN_PW" build.keychain
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Write notarization API key
        env:
          NOTARY_KEY_BASE64: ${{ secrets.NOTARY_API_KEY_BASE64 }}
        run: echo "$NOTARY_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/notary_key.p8"

      - name: Build, sign, and notarize installer pkg
        id: build
        env:
          NOTARY_API_KEY_PATH: ${{ runner.temp }}/notary_key.p8
          NOTARY_API_KEY_ID: ${{ secrets.NOTARY_API_KEY_ID }}
          NOTARY_API_ISSUER_ID: ${{ secrets.NOTARY_API_ISSUER_ID }}
        run: Resources/Packaging/build-pkg.sh

      - name: Clean up notarization API key
        if: always()
        run: rm -f "$RUNNER_TEMP/notary_key.p8"

      - name: Delete temporary keychain
        if: always()
        run: security delete-keychain build.keychain || true

      - name: Upload pkg to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ steps.build.outputs.pkg_path }}" --clobber
